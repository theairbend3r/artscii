name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:


permissions:
  contents: write

jobs:
  create-release:
    name: Create draft release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
      - name: Set release version
        id: set-version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          
      - name: Verify Cargo.toml version matches tag
        run: |
          if ! grep -q "version = \"$VERSION\"" Cargo.toml; then
            echo "Cargo.toml version does not match tag" >&2
            exit 1
          fi
          
      - name: Create draft GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v${{ steps.set-version.outputs.version }}" --draft --title "v${{ steps.set-version.outputs.version }}"

  build-release:
    needs: create-release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    env:
      BINARY_NAME: artscii

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/${BINARY_NAME} || true

      - name: Package
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          NAME="${BINARY_NAME}-${VERSION}-${{ matrix.target }}"
          
          mkdir -p dist/$NAME
          cp target/${{ matrix.target }}/release/${BINARY_NAME} dist/$NAME/
          
          tar -czf "$NAME.tar.gz" -C dist "$NAME"
  
      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"

  release:
    needs: [create-release, build-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          
      - name: Upload to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          gh release upload "v$VERSION" dist/**/*.tar.gz
