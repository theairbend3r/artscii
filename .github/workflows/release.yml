name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:


permissions:
  contents: write
  
jobs:
  create-release:
    name: create-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Get the release version from the tag
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV
      - name: Show the version
        run: |
          echo "version is: $VERSION"
      - name: Debug values
        run: |
          echo "GITHUB_REF_NAME=$GITHUB_REF_NAME"
          echo "VERSION=$VERSION"
      - name: Check that tag version and Cargo.toml version are the same
        shell: bash
        run: |
          if ! grep -q "version = \"$VERSION\"" Cargo.toml; then
            echo "version does not match Cargo.toml" >&2
            exit 1
          fi
      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "v$VERSION" --draft --verify-tag --title "v$VERSION"
    outputs:
      version: ${{ env.VERSION }}

  build-release:
    needs: create-release
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin

    env:
      BINARY_NAME: artscii

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary
        run: strip target/${{ matrix.target }}/release/${BINARY_NAME} || true

      - name: Package
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          NAME="${BINARY_NAME}-${VERSION}-${{ matrix.target }}"
          
          mkdir -p dist/$NAME
          cp target/${{ matrix.target }}/release/${BINARY_NAME} dist/$NAME/
          
          tar -czf "$NAME.tar.gz" -C dist "$NAME"
  
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"

  release:
    needs: [create-release, build-release]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Upload to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.create-release.outputs.version }}"
          gh release upload "v$VERSION" dist/**/*.tar.gz
